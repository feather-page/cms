{{ $related := .Site.RegularPages.Related . | first 5 }}
{{ with $related }}
<section class="related-posts">
  <h2>Related Posts</h2>
  <ul>
    {{ range . }}
    <li><a href="{{ .RelPermalink }}">{{ with .Params.emoji }}{{ . }} {{ end }}{{ .Title }}</a></li>
    {{ end }}
  </ul>
</section>
{{ end }}
